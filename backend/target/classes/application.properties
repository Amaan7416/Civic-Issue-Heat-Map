# CivicSense Backend Configuration
server.port=8080

# ============================================
# MySQL CONFIGURATION (Primary)
# Uncomment below to use MySQL database
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/civicsense?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# H2 CONFIGURATION (Default - No Setup Required)
# Used for development/demo
# ============================================
spring.datasource.url=jdbc:h2:mem:civicsense
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always

# ============================================
# APP SETTINGS
# ============================================
spring.application.name=CivicSense
logging.level.com.civicsense=INFO
logging.level.org.springframework.web=INFO

# ============================================
# CORS Configuration (Restricted)
# ============================================
spring.mvc.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# ============================================
# JWT Configuration
# ============================================
jwt.secret=MySecretKeyForCivicSenseJWT Authentication2024SecureKey
jwt.expiration=86400000

# ============================================
# Admin Credentials (Production: use env vars)
admin.username=admin
admin.password=admin123

# File Upload (for future photo upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB